name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Check dist is up to date
        run: |
          if [[ -n "$(git status --porcelain dist/)" ]]; then
            echo "dist/ is out of date. Please run 'pnpm build' and commit the result."
            git diff dist/
            exit 1
          fi
